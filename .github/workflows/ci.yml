name: Aether Lexer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake g++ ccache clang-format

    - name: Check Code Formatting
      run: find . -iname "*.cpp" -o -iname "*.hpp" -o -iname "*.h" | xargs clang-format --dry-run --Werror

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache
        variant: ccache

    - name: Configure CMake
      # This creates a 'build' directory and prepares the project
      run: | 
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache

    - name: Build Lexer
      # This actually compiles your C++ code
      run: cmake --build build --config Debug

    - name: Lexer Smoke Test
      run: |
        echo "Creating a sample Aether file..."
        echo 'string name = "Me";' > test.at
        
        echo "Running the lexer..."
        
        ./build/aether test.at
        
        echo "Lexer successfully processed the file without crashing!"
