name: Aether Lexer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake g++

    - name: Check Code Formatting
      run: |
        # This finds all .cpp and .h files and checks if they match the style
        find . -iname *.cpp -o -iname *.h | xargs clang-format --dry-run --Werror

    - name: Configure CMake
      # This creates a 'build' directory and prepares the project
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build Lexer
      # This actually compiles your C++ code
      run: cmake --build build --config Debug

    - name: Lexer Smoke Test
      run: |
        echo "Creating a sample Aether file..."
        echo 'string name = "Me";' > test.at
        
        echo "Running the lexer..."
        
        ./build/aether test.at
        
        echo "Lexer successfully processed the file without crashing!"